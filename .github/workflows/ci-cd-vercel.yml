name: CI/CD Vercel

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

jobs:
    ci:
        name: Lint, Test and Build
        runs-on: ubuntu-latest
        env:
            DATABASE_URL: ${{ secrets.DATABASE_URL }}
            DIRECT_URL: ${{ secrets.DIRECT_URL }}
            NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
            INVITE_FROM_EMAIL: ${{ secrets.INVITE_FROM_EMAIL }}
            INVITE_REPLY_TO: ${{ secrets.INVITE_REPLY_TO }}
            NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Generate Prisma Client
              run: npm run prisma:generate

            - name: Lint
              run: npm run lint

            - name: Run tests
              run: npm run test

            - name: Build
              run: npm run build

    deploy:
        name: Deploy to Vercel
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        needs: ci
        env:
            DATABASE_URL: ${{ secrets.DATABASE_URL }}
            DIRECT_URL: ${{ secrets.DIRECT_URL }}
            NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
            INVITE_FROM_EMAIL: ${{ secrets.INVITE_FROM_EMAIL }}
            INVITE_REPLY_TO: ${{ secrets.INVITE_REPLY_TO }}
            NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
            VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Generate Prisma Client
              run: npm run prisma:generate

            - name: Apply Prisma migrations (prod)
              run: npm run db:deploy

            - name: Seed production defaults (optional)
              if: ${{ secrets.RUN_PROD_SEED == 'true' }}
              run: npm run db:seed:prod

            - name: Pull Vercel environment
              run: npx vercel pull --yes --environment=production --token=${VERCEL_TOKEN}

            - name: Build Vercel artifacts
              run: npx vercel build --prod --token=${VERCEL_TOKEN}

            - name: Deploy to Vercel production
              run: npx vercel deploy --prebuilt --prod --token=${VERCEL_TOKEN}
